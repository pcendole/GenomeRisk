<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GenomeRisk — Clinical AI Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #F8FAFC;
        --surface: #FFFFFF;
        --surface2: #F1F5F9;
        --border: #E2E8F0;
        --border-hover: #CBD5E1;
        --text: #0F172A;
        --text-2: #475569;
        --text-3: #94A3B8;
        --accent: #2563EB;
        --accent-teal: #0891B2;
        --accent2: #0891B2;
        --danger: #EF4444;
        --warning: #F59E0B;
        --success: #10B981;
        --radius: 16px;
        --radius-sm: 10px;
        --shadow: 0 4px 20px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.02);
        --shadow-glow: 0 0 40px rgba(37, 99, 235, 0.04);
        --font: 'Inter', sans-serif;
        --mono: 'JetBrains Mono', monospace;
      }
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body { 
        font-family: var(--font); 
        background: var(--bg); 
        color: var(--text); 
        -webkit-font-smoothing: antialiased;
      }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }
      ::selection { background: rgba(37,99,235,0.15); color: var(--accent); }
      
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 0 0 rgba(37,99,235,0); }
        50%       { box-shadow: 0 0 20px 4px rgba(37,99,235,0.1); }
      }
      @keyframes shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .animate-in { animation: fadeUp 0.4s ease both; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
